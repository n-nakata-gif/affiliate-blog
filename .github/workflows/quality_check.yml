name: Weekly Quality Check

on:
  workflow_dispatch:   # 手動実行のみ（自動実行は weekly_report.yml に統合）

jobs:
  quality-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write    # rewrite_job.yml のトリガーに必要
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run quality check
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/quality_check.py
      - name: Auto-fix quality issues (title length / duplicate title)
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode quality
      - name: Detect no-affiliate articles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # gh コマンド用
        run: python src/detect_no_affiliate.py
      - name: Save rewrite queue to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rewrite_queue.json
          git diff --staged --quiet || git commit -m "chore: update rewrite queue [skip ci]"
          git pull --rebase && git push
