        run: python src/auto_fix.py --mode error --job travel-post

  gourmet-post:
    if: github.event.schedule == '0 0 * * 0' || github.event.schedule == '0 3 1,4,7,10,13 7 *' || github.event_name == 'workflow_dispatch'
