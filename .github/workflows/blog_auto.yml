name: Blog Auto Post

on:
  schedule:
    - cron: "0 0 * * 1,4"   # 月・木 09:00 JST → investment（週2本）※成約距離が近い証券口座開設系
    - cron: "0 0 * * 2,5"   # 火・金 09:00 JST → business（週2本）※転職・FP相談など無料登録系
    - cron: "0 0 * * 3"     # 水 09:00 JST     → gadget（週1本）
    - cron: "0 0 * * 6"     # 土 09:00 JST     → travel（週1本）
    - cron: "0 0 * * 0"     # 日 09:00 JST     → gourmet（週1本）
    # ── プライムデー特別編成（2026/7/1〜7/13のみ・1日2本体制）──────────
    # Amazon関連ジャンル(gadget/gourmet/business)だけを2本目として追加。
    # investment(Opus・高コスト)とtravelはAmazon非関連のため対象外。
    # 期間終了後（7/14以降）はこの3行を削除してよい。
    - cron: "0 3 3,6,9,12 7 *"      # 7/3,6,9,12 12:00 JST → gadget 2本目
    - cron: "0 3 1,4,7,10,13 7 *"   # 7/1,4,7,10,13 12:00 JST → gourmet 2本目
    - cron: "0 3 2,5,8,11 7 *"      # 7/2,5,8,11 12:00 JST → business 2本目
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 全ジョブ共通の自動修正ステップ（失敗時のみ実行）
# auto_fix.py が Claude でエラーを解析し、修正できればコミットしてメール通知する

jobs:
  gadget-post:
    if: github.event.schedule == '0 0 * * 3' || github.event.schedule == '0 3 3,6,9,12 7 *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - name: Generate
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:       ${{ secrets.X_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          UNSPLASH_API_KEY:      ${{ secrets.UNSPLASH_API_KEY }}
          RAKUTEN_APP_ID:        ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID:  ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python src/generate.py --genre gadget
      - name: Auto-fix on failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode error --job gadget-post

  business-post:
    if: github.event.schedule == '0 0 * * 2,5' || github.event.schedule == '0 3 2,5,8,11 7 *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - name: Collect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/collect.py
      - name: Analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/analyze.py
      - name: Generate
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:       ${{ secrets.X_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          UNSPLASH_API_KEY:      ${{ secrets.UNSPLASH_API_KEY }}
          RAKUTEN_APP_ID:        ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID:  ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python src/generate.py --genre business
      - name: Auto-fix on failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode error --job business-post

