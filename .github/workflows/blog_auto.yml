name: Blog Auto Post

on:
  schedule:
    - cron: "0 0 * * 1,4"   # 月・木 09:00 JST → gourmet（週2本）
    - cron: "0 0 * * 2,6"   # 火・土 09:00 JST → travel（週2本）
    - cron: "0 0 * * 3"     # 水 09:00 JST     → business（週1本）
    - cron: "0 0 * * 5"     # 金 09:00 JST     → investment（週1本）
    - cron: "0 0 * * 0"     # 日 09:00 JST     → gadget（週1本）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 全ジョブ共通の自動修正ステップ（失敗時のみ実行）
# auto_fix.py が Claude でエラーを解析し、修正できればコミットしてメール通知する

jobs:
  gadget-post:
    if: github.event.schedule == '0 0 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - name: Generate
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:       ${{ secrets.X_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          UNSPLASH_API_KEY:      ${{ secrets.UNSPLASH_API_KEY }}
          RAKUTEN_APP_ID:        ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID:  ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python src/generate.py --genre gadget
      - name: Auto-fix on failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode error --job gadget-post

  business-post:
    if: github.event.schedule == '0 0 * * 3' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - name: Collect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/collect.py
      - name: Analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/analyze.py
      - name: Generate
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:       ${{ secrets.X_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          UNSPLASH_API_KEY:      ${{ secrets.UNSPLASH_API_KEY }}
          RAKUTEN_APP_ID:        ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID:  ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python src/generate.py --genre business
      - name: Auto-fix on failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode error --job business-post

  investment-post:
