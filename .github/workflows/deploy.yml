name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

# 同時デプロイを防ぐ（記事生成とコード変更が重なっても安全）
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # リダイレクトチェックで直前のコミットと比較するため 2 commits 必要
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # 記事削除時にリダイレクト設定漏れがないかチェック
      # 漏れがある場合はここでデプロイが止まります
      - name: Check redirects for deleted pages
        run: bash scripts/check-redirects.sh

      - name: Build
        run: npm run build
        env:
          # GA4 測定ID（公開値・秘密情報ではない）。Astroビルド時にHTMLへ埋め込まれる
          PUBLIC_GA4_ID: G-YJ59ED4QQF

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
