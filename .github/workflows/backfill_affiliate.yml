name: Backfill Affiliate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '処理モード'
        required: true
        default: 'images'
        type: choice
        options:
          - 'images'           # Pixabay画像のみ
          - 'affiliate'        # アフィリエイトリンクのみ
          - 'editor-note'      # Noriのひとこと編集者コメントのみ
          - 'affiliate+editor' # アフィリエイト＋コメント
          - 'rewrite'          # 最新ガイドラインで本文リライト
          - 'pinterest'        # Pinterest再投稿（縦長画像＋Claude説明文）
          - 'internal-links'  # 同ジャンル関連記事への内部リンク追加
          - 'all'              # すべて
      force:
        description: '既存セクションを強制上書きする'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      genre:
        description: '対象ジャンル（空欄=全件）'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic requests
      - name: Run backfill
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: |
          ARGS=""
          MODE="${{ github.event.inputs.mode }}"

          # モードに応じてフラグ追加
          if [[ "$MODE" == "images" || "$MODE" == "all" ]]; then
            ARGS="$ARGS --images"
          fi
          if [[ "$MODE" == "affiliate" || "$MODE" == "affiliate+editor" || "$MODE" == "all" ]]; then
            ARGS="$ARGS --affiliate"
          fi
          if [[ "$MODE" == "editor-note" || "$MODE" == "affiliate+editor" || "$MODE" == "all" ]]; then
            ARGS="$ARGS --editor-note"
          fi
          if [[ "$MODE" == "rewrite" || "$MODE" == "all" ]]; then
            ARGS="$ARGS --rewrite"
          fi
          if [[ "$MODE" == "pinterest" ]]; then
            ARGS="$ARGS --pinterest"
          fi
          if [[ "$MODE" == "internal-links" || "$MODE" == "all" ]]; then
            ARGS="$ARGS --internal-links"
          fi

          # force オプション
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          # genre オプション
          if [ -n "${{ github.event.inputs.genre }}" ]; then
            ARGS="$ARGS --genre ${{ github.event.inputs.genre }}"
          fi

          python src/backfill_articles.py $ARGS
