name: Note Daily Post

# 火・金 21:00 JST（12:00 UTC）に自動実行
# ビジネス記事をnote向けに変換して投稿する
on:
  schedule:
    - cron: "0 12 * * 2,5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  note-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Generate note draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/note_generate.py

      - name: Post to note.com
        env:
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          NOTE_EMAIL:          ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD:       ${{ secrets.NOTE_PASSWORD }}
        run: python src/note_post.py

      - name: Commit updated tracker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/note_drafts/ data/note_posted.json
          git diff --staged --quiet || git commit -m "note: auto-post $(date +%Y%m%d) [skip ci]"
          git pull --rebase && git push

      - name: Auto-fix on failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/auto_fix.py --mode error --job note-post
