name: Rewrite Articles (Human Style)

# 手動実行のみ（一括リライト）
on:
  workflow_dispatch:
    inputs:
      genre:
        description: "ジャンル絞り込み (空白=全件, business/investment/gadget/travel/gourmet)"
        required: false
        default: ""
      limit:
        description: "処理件数上限 (0=無制限)"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rewrite script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.genre }}" ]; then
            ARGS="$ARGS --genre ${{ github.event.inputs.genre }}"
          fi
          if [ "${{ github.event.inputs.limit }}" != "0" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python src/rewrite_human.py $ARGS

      - name: Commit rewritten articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "rewrite: AIっぽい文体を人間らしく一括修正 [skip ci]"
          # コンフリクト時はリライト結果を優先してマージ
          git pull --no-rebase -X ours && git push
