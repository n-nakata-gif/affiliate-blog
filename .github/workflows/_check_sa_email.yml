name: _Check SA Email (delete after use)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Show GSC service account email
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GSC_SERVICE_ACCOUNT_JSON" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print('client_email:', d.get('client_email', '未設定'))
          print('project_id:  ', d.get('project_id', '未設定'))
          "
