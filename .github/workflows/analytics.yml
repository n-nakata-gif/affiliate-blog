name: Weekly Analytics & Keyword Report

on:
  schedule:
    - cron: "0 1 * * 1"   # 毎週月曜 10:00 JST (UTC+1 ≈ JST-9)
  workflow_dispatch:       # 手動実行も可能

jobs:
  ga4-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-analytics-data google-auth
      - name: Run GA4 report
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/ga4_report.py

  keyword-suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-auth google-api-python-client
      - name: Run keyword suggestion
        env:
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/keyword_suggest.py
      - name: Commit keyword suggestions
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f data/keyword_suggestions.json ]; then
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"
            git add data/keyword_suggestions.json
            git diff --staged --quiet || git commit -m "auto: update keyword suggestions $(date -u +%Y%m%d)"
            git push https://x-access-token:${GH_TOKEN}@github.com/n-nakata-gif/affiliate-blog.git HEAD:main
          fi
