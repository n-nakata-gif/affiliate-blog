name: Weekly Analytics & Keyword Report

on:
  workflow_dispatch:   # 手動実行のみ（自動実行は weekly_report.yml に統合）

jobs:
  ga4-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-analytics-data google-auth
      - name: Run GA4 report
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/ga4_report.py

  keyword-suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-auth google-api-python-client
      - name: Run keyword suggestion
        env:
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GSC_OAUTH_CREDENTIALS:  ${{ secrets.GSC_OAUTH_CREDENTIALS }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/keyword_suggest.py
      - name: Save keyword suggestions to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/keyword_suggestions.json
          git diff --staged --quiet || git commit -m "chore: update keyword suggestions [skip ci]"
          git pull --rebase && git push

  ranking-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ranking monitor
        env:
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GSC_OAUTH_CREDENTIALS: ${{ secrets.GSC_OAUTH_CREDENTIALS }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/ranking_monitor.py
      - name: Save ranking history to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranking_history.json
          git diff --staged --quiet || git commit -m "chore: update ranking history [skip ci]"
          git pull --rebase && git push

  revenue-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-api-python-client google-auth
      - name: Run revenue report
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          ADSENSE_PUBLISHER_ID:     ${{ secrets.ADSENSE_PUBLISHER_ID }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/revenue_report.py
