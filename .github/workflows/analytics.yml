name: Weekly Analytics & Keyword Report

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  ga4-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-analytics-data google-auth
      - name: Run GA4 report
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/ga4_report.py

  keyword-suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-auth google-api-python-client
      - name: Run keyword suggestion
        env:
          GSC_SITE_URL:           ${{ secrets.GSC_SITE_URL }}
          GSC_OAUTH_CREDENTIALS:  ${{ secrets.GSC_OAUTH_CREDENTIALS }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/keyword_suggest.py
      - name: Save keyword suggestions as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keyword-suggestions
          path: data/keyword_suggestions.json
          if-no-files-found: ignore

  ranking-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ranking monitor
        env:
          GSC_SITE_URL:          ${{ secrets.GSC_SITE_URL }}
          GSC_OAUTH_CREDENTIALS: ${{ secrets.GSC_OAUTH_CREDENTIALS }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/ranking_monitor.py
      - name: Save ranking history to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranking_history.json
          git diff --staged --quiet || git commit -m "chore: update ranking history [skip ci]"
          git push
