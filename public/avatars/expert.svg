  <circle cx="24" cy="33" r="2.8" fill="#1a0a0a"/>
  <!-- 瞳（右） -->
  <circle cx="36" cy="33" r="2.8" fill="#1a0a0a"/>
  <!-- ハイライト（左） -->
  <circle cx="25.2" cy="31.8" r="1.1" fill="white"/>
  <!-- ハイライト（右） -->
  <circle cx="37.2" cy="31.8" r="1.1" fill="white"/>
