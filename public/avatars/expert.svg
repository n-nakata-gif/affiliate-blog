<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Background -->
    <circle cx="50" cy="50" r="50" fill="#d1fae5"/>
    <!-- Body / dark business shirt -->
    <path d="M0 100 L0 82 Q20 78 37 78 L43 75 L50 82 L57 75 L63 78 Q80 78 100 82 L100 100Z" fill="#065f46"/>
    <!-- White collar -->
    <path d="M43 75 L50 79 L57 75 L57 72 L50 75 L43 72Z" fill="white"/>
    <!-- Collar V line -->
    <path d="M43 75 L50 82 L57 75" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Neck -->
    <rect x="44" y="72" width="12" height="6" rx="1" fill="#f0c080"/>
    <!-- Face -->
    <circle cx="50" cy="52" r="23" fill="#fcd9a8"/>
    <!-- Ears -->
    <ellipse cx="27.5" cy="53" rx="3" ry="4" fill="#f0c080"/>
    <ellipse cx="72.5" cy="53" rx="3" ry="4" fill="#f0c080"/>
    <!-- Neat short black hair with side part -->
    <path d="M27 47 Q27 28 50 28 Q73 28 73 47 Q70 33 56 32 Q50 31 46 33 Q34 35 27 47Z" fill="#111827"/>
    <!-- Side part line -->
    <path d="M46 33 Q47 37 47.5 42" stroke="#1f2937" stroke-width="1.5" fill="none"/>
    <!-- Sideburns -->
    <path d="M27 47 Q25 54 27 59 Q29 55 30 50Z" fill="#111827"/>
    <path d="M73 47 Q75 54 73 59 Q71 55 70 50Z" fill="#111827"/>
    <!-- Eyebrows (clean, professional) -->
    <path d="M33 43 Q38.5 41.5 44 43" stroke="#111827" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56 43 Q61.5 41.5 67 43" stroke="#111827" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Left eye -->
    <ellipse cx="38" cy="51" rx="5.5" ry="4.8" fill="white"/>
    <circle cx="38" cy="51" r="3.2" fill="#2d5a3d"/>
    <circle cx="38.5" cy="51" r="1.8" fill="#111"/>
    <circle cx="39.3" cy="50" r="0.9" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="62" cy="51" rx="5.5" ry="4.8" fill="white"/>
    <circle cx="62" cy="51" r="3.2" fill="#2d5a3d"/>
    <circle cx="62.5" cy="51" r="1.8" fill="#111"/>
    <circle cx="63.3" cy="50" r="0.9" fill="white"/>
    <!-- Glasses frames -->
    <rect x="30.5" y="47" width="16" height="10" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
    <rect x="53.5" y="47" width="16" height="10" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Glasses bridge -->
    <line x1="46.5" y1="52" x2="53.5" y2="52" stroke="#333" stroke-width="1.8"/>
    <!-- Nose -->
    <path d="M47.5 59 Q50 63 52.5 59" stroke="#c07040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Confident smile -->
    <path d="M41 65.5 Q50 72 59 65.5" stroke="#b05030" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Light blush -->
    <ellipse cx="29" cy="57" rx="4" ry="2" fill="#ffaa88" opacity="0.25"/>
    <ellipse cx="71" cy="57" rx="4" ry="2" fill="#ffaa88" opacity="0.25"/>
  </g>
</svg>
