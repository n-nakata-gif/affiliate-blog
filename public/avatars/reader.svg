  <!-- 髪（中程度） -->
  <path d="M15 28 Q15 11 30 9 Q45 11 45 28 Q42 17 30 15 Q18 17 15 28Z" fill="#78350f"/>
  <!-- 耳（左） -->
  <ellipse cx="14" cy="34" rx="3.5" ry="5" fill="#fde68a"/>
  <!-- 耳（右） -->
  <ellipse cx="46" cy="34" rx="3.5" ry="5" fill="#fde68a"/>
  <!-- 白目（左） -->
  <ellipse cx="24" cy="31" rx="3.8" ry="4" fill="white"/>
  <!-- 白目（右） -->
  <ellipse cx="36" cy="31" rx="3.8" ry="4" fill="white"/>
  <!-- 瞳（左） -->
  <circle cx="24" cy="32" r="2.5" fill="#1a0a0a"/>
  <!-- 瞳（右） -->
  <circle cx="36" cy="32" r="2.5" fill="#1a0a0a"/>
  <!-- ハイライト（左） -->
  <circle cx="25.2" cy="30.8" r="1" fill="white"/>
  <!-- ハイライト（右） -->
  <circle cx="37.2" cy="30.8" r="1" fill="white"/>
  <!-- 眉（少し上がり気味＝疑問顔） -->
  <path d="M20 26 Q24 22 28 24" stroke="#78350f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M32 24 Q36 22 40 26" stroke="#78350f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 口（少し開いた感じ） -->
