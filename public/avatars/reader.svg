<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Background -->
    <circle cx="50" cy="50" r="50" fill="#fef3c7"/>
    <!-- Body / casual yellow top -->
    <path d="M0 100 L0 84 Q20 80 38 80 L44 77 L50 84 L56 77 L62 80 Q80 80 100 84 L100 100Z" fill="#fbbf24"/>
    <!-- Neck -->
    <rect x="44" y="74" width="12" height="8" rx="2" fill="#f0c080"/>
    <!-- Face -->
    <circle cx="50" cy="53" r="23" fill="#fcd9a8"/>
    <!-- Fluffy brown hair (layered ellipses) -->
    <ellipse cx="50" cy="23" rx="22" ry="13" fill="#8B4513"/>
    <ellipse cx="30" cy="31" rx="11" ry="10" fill="#9B5523"/>
    <ellipse cx="70" cy="31" rx="11" ry="10" fill="#9B5523"/>
    <ellipse cx="38" cy="26" rx="11" ry="9" fill="#8B4513"/>
    <ellipse cx="62" cy="26" rx="11" ry="9" fill="#8B4513"/>
    <ellipse cx="25" cy="42" rx="8" ry="10" fill="#9B5523"/>
    <ellipse cx="75" cy="42" rx="8" ry="10" fill="#9B5523"/>
    <!-- Ears -->
    <ellipse cx="27" cy="54" rx="3" ry="4" fill="#f0c080"/>
    <ellipse cx="73" cy="54" rx="3" ry="4" fill="#f0c080"/>
    <!-- Eyebrows (raised / surprised) -->
    <path d="M33 44 Q38.5 40.5 44 44" stroke="#6b3a1f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M56 44 Q61.5 40.5 67 44" stroke="#6b3a1f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Left eye (wide, round) -->
    <circle cx="38.5" cy="52" r="6.5" fill="white"/>
    <circle cx="38.5" cy="52" r="4.2" fill="#8B6914"/>
    <circle cx="39" cy="52" r="2.5" fill="#111"/>
    <circle cx="40" cy="50.6" r="1.2" fill="white"/>
    <!-- Right eye (wide, round) -->
    <circle cx="61.5" cy="52" r="6.5" fill="white"/>
    <circle cx="61.5" cy="52" r="4.2" fill="#8B6914"/>
    <circle cx="62" cy="52" r="2.5" fill="#111"/>
    <circle cx="63" cy="50.6" r="1.2" fill="white"/>
    <!-- Nose -->
    <path d="M47.5 59.5 Q50 63 52.5 59.5" stroke="#c07040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Surprised O-shaped mouth -->
    <ellipse cx="50" cy="67.5" rx="5.5" ry="5" fill="#c05030"/>
    <ellipse cx="50" cy="67" rx="4" ry="3" fill="white"/>
    <!-- Cheek blush -->
    <ellipse cx="29" cy="57" rx="5" ry="2.5" fill="#ffaa44" opacity="0.4"/>
    <ellipse cx="71" cy="57" rx="5" ry="2.5" fill="#ffaa44" opacity="0.4"/>
  </g>
</svg>
