<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Background -->
    <circle cx="50" cy="50" r="50" fill="#fce7f3"/>
    <!-- Long dark hair (behind face) -->
    <path d="M28 42 Q17 57 17 80 Q19 100 38 100 L62 100 Q81 100 83 80 Q83 57 72 42 Q64 28 50 28 Q36 28 28 42Z" fill="#2d1208"/>
    <!-- Body / pink top -->
    <path d="M0 100 L0 85 Q20 80 38 80 L44 78 L50 85 L56 78 L62 80 Q80 80 100 85 L100 100Z" fill="#f472b6"/>
    <!-- Neck -->
    <rect x="44" y="73" width="12" height="8" rx="2" fill="#f0c080"/>
    <!-- Face -->
    <circle cx="50" cy="52" r="22" fill="#fcd9a8"/>
    <!-- Ears -->
    <ellipse cx="28.5" cy="53" rx="2.5" ry="3.5" fill="#f0c080"/>
    <ellipse cx="71.5" cy="53" rx="2.5" ry="3.5" fill="#f0c080"/>
    <!-- Front hair (top) -->
    <path d="M28 45 Q28 29 50 29 Q72 29 72 45 Q68 33 50 33 Q32 33 28 45Z" fill="#2d1208"/>
    <!-- Eyebrows (thin, feminine arched) -->
    <path d="M33 43 Q38 40 43 43" stroke="#2d1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M57 43 Q62 40 67 43" stroke="#2d1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Left eye (large with lashes) -->
    <ellipse cx="38" cy="50" rx="6" ry="5.5" fill="white"/>
    <circle cx="38" cy="50" r="3.8" fill="#6b2d1a"/>
    <circle cx="38.5" cy="50" r="2.2" fill="#111"/>
    <circle cx="39.3" cy="48.8" r="1.1" fill="white"/>
    <!-- Left top lashes -->
    <line x1="32.5" y1="47" x2="31" y2="44.5" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="35.5" y1="45.5" x2="34.5" y2="43" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="38" y1="44.5" x2="38" y2="42" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="40.5" y1="45.5" x2="41.5" y2="43" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="43" y1="47" x2="44.5" y2="44.5" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Right eye (large with lashes) -->
    <ellipse cx="62" cy="50" rx="6" ry="5.5" fill="white"/>
    <circle cx="62" cy="50" r="3.8" fill="#6b2d1a"/>
    <circle cx="62.5" cy="50" r="2.2" fill="#111"/>
    <circle cx="63.3" cy="48.8" r="1.1" fill="white"/>
    <!-- Right top lashes -->
    <line x1="56.5" y1="47" x2="55" y2="44.5" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="59" y1="45.5" x2="58" y2="43" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="62" y1="44.5" x2="62" y2="42" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="64.5" y1="45.5" x2="65.5" y2="43" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="67" y1="47" x2="68.5" y2="44.5" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M48 57 Q50 60.5 52 57" stroke="#c07040" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <!-- Open bright smile -->
    <path d="M40 63 Q50 71 60 63 Q50 67 40 63Z" fill="#c05030"/>
    <path d="M41.5 63.5 Q50 69 58.5 63.5 Q50 66.5 41.5 63.5Z" fill="white"/>
    <!-- Cheek blush -->
    <ellipse cx="28" cy="56" rx="5" ry="2.5" fill="#ff96b2" opacity="0.4"/>
    <ellipse cx="72" cy="56" rx="5" ry="2.5" fill="#ff96b2" opacity="0.4"/>
  </g>
</svg>
